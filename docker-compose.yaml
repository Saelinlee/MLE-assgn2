services:

  # -------------------------------------------------------------------------
  # JupyterLab — for interactive development and EDA
  # Access: http://localhost:8888
  # -------------------------------------------------------------------------
  jupyter:
    build: .
    container_name: jupyter_lab
    ports:
      - "8888:8888"
    volumes:
      - .:/app
    environment:
      - JUPYTER_ENABLE_LAB=yes
    command: ["jupyter", "lab", "--ip=0.0.0.0", "--port=8888", "--no-browser",
              "--allow-root", "--notebook-dir=/app",
              "--ServerApp.token=''", "--ServerApp.disable_check_xsrf=True"]


  # -------------------------------------------------------------------------
  # Airflow — initialises the DB and creates the admin user (runs once)
  # -------------------------------------------------------------------------
  airflow-init:
    build: .
    environment:
      - AIRFLOW__CORE__EXECUTOR=SequentialExecutor
      - AIRFLOW__CORE__FERNET_KEY=PAqBeGJLJTYFzVkOGHWIYXdLO7XdXz5yTdxAGJe9ezM=
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - AIRFLOW_HOME=/opt/airflow
    volumes:
      - airflow_data:/opt/airflow
      - ./dags:/opt/airflow/dags
      - .:/opt/airflow/scripts      # project root → /opt/airflow/scripts
    command:
      - bash
      - -c
      - |
        airflow db init &&
        airflow users create \
          --username admin \
          --password admin \
          --firstname Admin \
          --lastname User \
          --role Admin \
          --email admin@example.com


  # -------------------------------------------------------------------------
  # Airflow Webserver — UI at http://localhost:8080  (admin / admin)
  # -------------------------------------------------------------------------
  airflow-webserver:
    build: .
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    environment:
      - AIRFLOW__CORE__EXECUTOR=SequentialExecutor
      - AIRFLOW__CORE__FERNET_KEY=PAqBeGJLJTYFzVkOGHWIYXdLO7XdXz5yTdxAGJe9ezM=
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - AIRFLOW_HOME=/opt/airflow
    volumes:
      - airflow_data:/opt/airflow
      - ./dags:/opt/airflow/dags
      - .:/opt/airflow/scripts
    ports:
      - "8080:8080"
    command: ["airflow", "webserver"]


  # -------------------------------------------------------------------------
  # Airflow Scheduler — picks up and executes DAG runs
  # -------------------------------------------------------------------------
  airflow-scheduler:
    build: .
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    environment:
      - AIRFLOW__CORE__EXECUTOR=SequentialExecutor
      - AIRFLOW__CORE__FERNET_KEY=PAqBeGJLJTYFzVkOGHWIYXdLO7XdXz5yTdxAGJe9ezM=
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - AIRFLOW_HOME=/opt/airflow
    volumes:
      - airflow_data:/opt/airflow
      - ./dags:/opt/airflow/dags
      - .:/opt/airflow/scripts
    command: ["airflow", "scheduler"]


volumes:
  airflow_data:   # shared Airflow home (DB, logs, plugins) across all Airflow services
